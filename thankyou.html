<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Pat Miazga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 40px 24px;
    }
    .thankyou-box {
      max-width: 540px;
      text-align: center;
      background: var(--white);
      padding: 64px 48px;
      border: 1px solid var(--border);
    }
    .thankyou-check {
      font-size: 3rem;
      color: var(--accent);
      margin-bottom: 24px;
      display: block;
    }
    .thankyou-box h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .thankyou-box p {
      font-size: 16px;
      color: var(--warm-mid);
      line-height: 1.75;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="thankyou-page">
    <div class="thankyou-box">
      <span class="thankyou-check">&#10003;</span>
      <h1>Message received.</h1>
      <p>Thanks for reaching out. Pat will be in touch shortly — usually within the same business day.</p>
      <a href="index.html" class="btn-primary">Back to Site</a>
    </div>
  </div>
</body>
</html>
